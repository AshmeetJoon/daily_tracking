<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f2f0eb;
    --border: #d8d5ce;
    --border-strong: #a8a49c;
    --text: #111110;
    --text-muted: #6b6860;
    --text-dim: #a8a49c;
    --accent: #111110;
    --accent-inv: #ffffff;
    --green: #2a6b3a;
    --green-bg: #e8f5ec;
    --orange: #7a4010;
    --orange-bg: #fdf0e6;
    --red: #8b1c1c;
    --red-bg: #fdf0f0;
    --yellow: #6b5500;
    --yellow-bg: #fdf8e6;
    --blue: #1a3d6b;
    --blue-bg: #eaf0fa;
    --purple: #3d2d7a;
    --purple-bg: #f0eefa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 28px;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    padding-bottom: 24px;
    border-bottom: 1.5px solid var(--text);
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 3px; width: 22px;
  }
  .logo-grid span {
    display: block; width: 9px; height: 9px;
    border-radius: 1px;
  }
  .logo-grid span:nth-child(1) { background: var(--text); }
  .logo-grid span:nth-child(2) { background: transparent; border: 1.5px solid var(--text); }
  .logo-grid span:nth-child(3) { background: transparent; border: 1.5px solid var(--text); }
  .logo-grid span:nth-child(4) { background: var(--text); }

  .nav-date { display: flex; align-items: center; gap: 10px; }
  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 0;
    background: transparent; border: 1.5px solid var(--border-strong);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .15s;
  }
  .nav-btn:hover { background: var(--text); color: var(--accent-inv); border-color: var(--text); }

  .date-label {
    font-size: 14px; font-weight: 500; color: var(--text);
    min-width: 190px; text-align: center;
    font-family: 'DM Mono', monospace; letter-spacing: 0.3px;
  }

  .add-task-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 20px;
    background: var(--text); color: var(--accent-inv);
    border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s; letter-spacing: 0.3px;
  }
  .add-task-btn:hover { background: #333; }
  .add-task-btn svg { width: 15px; height: 15px; }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; margin-bottom: 32px; border: 1.5px solid var(--text); }
  @media(max-width:640px){ .stats { grid-template-columns: 1fr 1fr; } }
  .stat-card { background: var(--surface); padding: 20px 22px; border-right: 1px solid var(--border); }
  .stat-card:last-child { border-right: none; }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; letter-spacing: 0.8px; text-transform: uppercase; }
  .stat-value { font-size: 36px; font-weight: 700; line-height: 1; font-family: 'Playfair Display', serif; color: var(--text); }
  .stat-rate-bar { margin-top: 12px; height: 2px; background: var(--border); }
  .stat-rate-fill { height: 100%; background: var(--text); transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1.5px solid var(--border); }
  .tab-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 20px;
    border: none; border-bottom: 2px solid transparent;
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .15s; margin-bottom: -1.5px;
    letter-spacing: 0.2px;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }
  .tab-btn svg { width: 15px; height: 15px; }

  /* ── Progress ── */
  .progress-row {
    display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    padding: 14px 18px; background: var(--surface); border: 1px solid var(--border);
  }
  .progress-label { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.6px; }
  .progress-label svg { width: 14px; height: 14px; }
  .progress-bar { flex: 1; height: 2px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--text); transition: width .6s cubic-bezier(.4,0,.2,1); }
  .progress-text { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; white-space: nowrap; }

  /* ── Filters ── */
  .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s; letter-spacing: 0.3px;
  }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--accent-inv); font-weight: 600; }

  /* ── Task Table ── */
  .task-table { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
  .table-head {
    display: grid; grid-template-columns: 44px 140px 1fr 100px 80px 44px;
    padding: 10px 16px; border-bottom: 1.5px solid var(--text);
    font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    background: var(--surface2);
  }
  .task-row {
    display: grid; grid-template-columns: 44px 140px 1fr 100px 80px 44px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    align-items: center; transition: background .1s; animation: rowIn .2s ease both;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: var(--surface2); }
  .task-row.completed { opacity: 0.5; }
  @keyframes rowIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* ── Checkbox ── */
  .task-check { display: flex; align-items: center; justify-content: center; }
  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-strong); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .check-box:hover { border-color: var(--text); background: var(--surface2); }
  .check-box.checked { background: var(--text); border-color: var(--text); }
  .check-box svg { width: 12px; height: 12px; stroke: var(--accent-inv); stroke-width: 2.5; opacity: 0; transform: scale(0.5); transition: all .15s cubic-bezier(.4,0,.2,1); }
  .check-box.checked svg { opacity: 1; transform: scale(1); }

  /* ── Time input ── */
  .task-time { display: flex; flex-direction: column; gap: 3px; }
  .time-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text-muted); font-family: 'DM Mono', monospace;
    font-size: 11px; width: 90px; padding: 1px 0; outline: none;
    cursor: text; transition: border-color .15s, color .15s;
  }
  .time-input:hover { border-bottom-color: var(--border); }
  .time-input:focus { border-bottom-color: var(--text); color: var(--text); }

  /* ── Task info ── */
  .task-info { display: flex; flex-direction: column; gap: 2px; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .task-row.completed .task-name { text-decoration: line-through; color: var(--text-dim); }
  .task-sub { font-size: 12px; color: var(--text-muted); }
  .task-row.completed .task-sub { color: var(--text-dim); }

  /* ── Badge ── */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; border: 1px solid; }
  .badge-meeting  { background: var(--blue-bg);   color: var(--blue);   border-color: #b5c8e8; }
  .badge-work     { background: var(--purple-bg); color: var(--purple); border-color: #c4bae8; }
  .badge-personal { background: var(--green-bg);  color: var(--green);  border-color: #aad4b4; }
  .badge-health   { background: var(--orange-bg); color: var(--orange); border-color: #e8c8a0; }
  .badge-other    { background: var(--red-bg);    color: var(--red);    border-color: #e8b4b4; }

  /* ── Priority ── */
  .priority { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .prio-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .prio-high { background: var(--red); }
  .prio-med  { background: var(--yellow); }
  .prio-low  { background: var(--green); }

  /* ── Delete ── */
  .del-btn {
    width: 30px; height: 30px; border: 1px solid transparent;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .15s; margin-left: auto;
  }
  .del-btn:hover { background: var(--red-bg); border-color: #e8b4b4; color: var(--red); }
  .del-btn svg { width: 14px; height: 14px; }

  .empty-state { padding: 48px 24px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .empty-state svg { width: 36px; height: 36px; margin: 0 auto 12px; display: block; opacity: 0.25; }

  /* ══ MODAL ══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1.5px solid var(--text);
    width: 820px; max-width: calc(100vw - 32px);
    max-height: 90vh; display: flex; flex-direction: column;
    box-shadow: 6px 6px 0px var(--text);
    animation: modalIn .2s ease both; overflow: hidden;
  }
  @keyframes modalIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 0;
    flex-shrink: 0;
  }
  .modal-title-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: var(--text);
  }
  .modal-close {
    width: 28px; height: 28px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s;
  }
  .modal-close:hover { background: var(--text); color: var(--accent-inv); border-color: var(--text); }

  .modal-tabs {
    display: flex; border-bottom: 1.5px solid var(--text);
    padding: 0 24px; margin-top: 16px; flex-shrink: 0;
  }
  .modal-tab {
    padding: 10px 20px; border: none; border-bottom: 2px solid transparent;
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s; margin-bottom: -1.5px; letter-spacing: 0.3px;
  }
  .modal-tab.active { color: var(--text); border-bottom-color: var(--text); }

  .modal-body { flex: 1; overflow-y: auto; padding: 22px 24px 28px; }
  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border-strong); }

  /* form */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .form-input, .form-select {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--text); }
  .form-input.mono { font-family: 'DM Mono', monospace; font-size: 13px; }
  .form-select option { background: var(--surface); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-cancel {
    flex: 1; padding: 11px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-create {
    flex: 2; padding: 11px; border: none;
    background: var(--text); color: var(--accent-inv);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s;
  }
  .btn-create:hover { background: #333; }

  /* manage list */
  .manage-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); }
  .manage-item {
    display: grid; grid-template-columns: 1fr 120px 90px 90px 36px;
    align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    transition: background .1s; animation: rowIn .2s ease both;
  }
  .manage-item:last-child { border-bottom: none; }
  .manage-item:hover { background: var(--surface2); }
  .manage-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .manage-item-name span { font-size: 11px; font-weight: 400; color: var(--text-muted); display: block; margin-top: 1px; }
  .manage-item-time { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); }
  .manage-del-btn {
    width: 30px; height: 30px; border: 1px solid transparent;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .manage-del-btn:hover { background: var(--red-bg); border-color: #e8b4b4; color: var(--red); }
  .manage-del-btn svg { width: 14px; height: 14px; }
  .manage-empty { padding: 32px; text-align: center; color: var(--text-dim); font-size: 14px; border: 1px solid var(--border); }
  .done-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; font-size: 11px; font-weight: 600; border: 1px solid; }
  .done-pill.yes { background: var(--green-bg); color: var(--green); border-color: #aad4b4; }
  .done-pill.no  { background: var(--orange-bg); color: var(--orange); border-color: #e8c8a0; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-grid"><span></span><span></span><span></span><span></span></div>
    Daily Task Tracker
  </div>
  <div class="nav-date">
    <button class="nav-btn" onclick="changeDate(-1)">&#8249;</button>
    <div class="date-label" id="dateLabel"></div>
    <button class="nav-btn" onclick="changeDate(1)">&#8250;</button>
  </div>
  <button class="add-task-btn" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add task
  </button>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total tasks</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value" id="statDone">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pending</div>
    <div class="stat-value" id="statPending">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completion rate</div>
    <div class="stat-value" id="statRate">0%</div>
    <div class="stat-rate-bar"><div class="stat-rate-fill" id="statRateFill" style="width:0%"></div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Daily tasks
  </button>
  <button class="tab-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Month overview
  </button>
</div>

<div class="progress-row">
  <div class="progress-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Today's progress
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0% 0/0</div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('work',this)">Work</button>
  <button class="filter-btn" onclick="setFilter('meeting',this)">Meeting</button>
  <button class="filter-btn" onclick="setFilter('personal',this)">Personal</button>
  <button class="filter-btn" onclick="setFilter('health',this)">Health</button>
</div>

<div class="task-table">
  <div class="table-head">
    <div></div>
    <div>Time</div>
    <div>Task</div>
    <div>Category</div>
    <div>Priority</div>
    <div></div>
  </div>
  <div id="taskList"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-text">Task Manager</div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="mTab-create" onclick="switchModalTab('create')">+ Create Task</button>
      <button class="modal-tab" id="mTab-manage" onclick="switchModalTab('manage')">All Tasks</button>
    </div>
    <div class="modal-body">
      <div class="tab-panel active" id="panel-create">
        <div class="form-group">
          <label class="form-label">Task Name</label>
          <input class="form-input" id="f-name" placeholder="e.g. Review pull request" />
        </div>
        <div class="form-group">
          <label class="form-label">Subtitle / Note</label>
          <input class="form-input" id="f-sub" placeholder="Optional note or description" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start Time</label>
            <input class="form-input mono" id="f-start" placeholder="e.g. 9:00 AM" />
          </div>
          <div class="form-group">
            <label class="form-label">End Time</label>
            <input class="form-input mono" id="f-end" placeholder="e.g. 10:00 AM" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="f-cat">
              <option value="work">Work</option>
              <option value="meeting">Meeting</option>
              <option value="personal">Personal</option>
              <option value="health">Health</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-select" id="f-prio">
              <option value="high">High</option>
              <option value="med">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-create" onclick="createTask()">+ Create Task</button>
        </div>
      </div>
      <div class="tab-panel" id="panel-manage">
        <div id="manageList"></div>
      </div>
    </div>
  </div>
</div>

<script>
let currentDate = new Date(2026,4,29);
let activeFilter = 'all';
let tasks = [
  {id:1,name:'Morning standup',sub:'Sprint review',start:'9:00 AM',end:'10:00 AM',category:'meeting',priority:'high',done:true},
  {id:2,name:'Write report draft',sub:'Due today',start:'10:00 AM',end:'12:00 PM',category:'work',priority:'high',done:false},
  {id:3,name:'Lunch break',sub:'',start:'1:00 PM',end:'2:00 PM',category:'personal',priority:'low',done:true},
  {id:4,name:'Code review',sub:'PR #42',start:'2:00 PM',end:'3:00 PM',category:'work',priority:'med',done:true},
  {id:5,name:'Gym session',sub:'Leg day',start:'6:00 PM',end:'7:00 PM',category:'health',priority:'med',done:false},
];
let nextId=6;

function formatDate(d){ return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'}); }
function changeDate(dir){ currentDate.setDate(currentDate.getDate()+dir); document.getElementById('dateLabel').textContent=formatDate(currentDate); }
document.getElementById('dateLabel').textContent=formatDate(currentDate);

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function catLabel(c){ return c.charAt(0).toUpperCase()+c.slice(1); }
function prioCls(p){ return p==='high'?'prio-high':p==='med'?'prio-med':'prio-low'; }
function prioLabel(p){ return p==='high'?'High':p==='med'?'Med':'Low'; }

function render(){
  const list=document.getElementById('taskList');
  const filtered=activeFilter==='all'?tasks:tasks.filter(t=>t.category===activeFilter);
  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/></svg>No tasks here. Click <strong>Add task</strong> to get started.</div>`;
  } else {
    list.innerHTML=filtered.map(t=>`
      <div class="task-row ${t.done?'completed':''}" id="row-${t.id}">
        <div class="task-check"><div class="check-box ${t.done?'checked':''}" onclick="toggleTask(${t.id})"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor"><polyline points="2,7 5.5,10.5 12,3.5"/></svg></div></div>
        <div class="task-time">
          <input class="time-input" value="${escHtml(t.start)}" placeholder="12:00 AM" onchange="updateTime(${t.id},'start',this.value)" />
          <input class="time-input" value="${escHtml(t.end)}" placeholder="12:00 PM" onchange="updateTime(${t.id},'end',this.value)" />
        </div>
        <div class="task-info">
          <div class="task-name">${escHtml(t.name)}</div>
          ${t.sub?`<div class="task-sub">${escHtml(t.sub)}</div>`:''}
        </div>
        <div><span class="badge badge-${t.category}">${catLabel(t.category)}</span></div>
        <div class="priority"><span class="prio-dot ${prioCls(t.priority)}"></span>${prioLabel(t.priority)}</div>
        <div><button class="del-btn" onclick="deleteTask(${t.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></div>
      </div>`).join('');
  }
  updateStats();
}

function updateStats(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length, rate=total?Math.round((done/total)*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statPending').textContent=total-done;
  document.getElementById('statRate').textContent=rate+'%';
  document.getElementById('statRateFill').style.width=rate+'%';
  document.getElementById('progressFill').style.width=rate+'%';
  document.getElementById('progressText').textContent=`${rate}% ${done}/${total}`;
}

function renderManage(){
  const el=document.getElementById('manageList');
  if(tasks.length===0){ el.innerHTML='<div class="manage-empty">No tasks yet. Create one from the "Create Task" tab.</div>'; return; }
  el.innerHTML=`<div class="manage-list">`+tasks.map(t=>`
    <div class="manage-item" id="mi-${t.id}">
      <div class="manage-item-name">${escHtml(t.name)}${t.sub?`<span>${escHtml(t.sub)}</span>`:''}</div>
      <div class="manage-item-time">${escHtml(t.start)} – ${escHtml(t.end)}</div>
      <div><span class="badge badge-${t.category}">${catLabel(t.category)}</span></div>
      <div><span class="${t.done?'done-pill yes':'done-pill no'}">${t.done?'✓ Done':'⏳ Pending'}</span></div>
      <button class="manage-del-btn" onclick="deleteFromManage(${t.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
    </div>`).join('')+`</div>`;
}

function toggleTask(id){ const t=tasks.find(x=>x.id===id); if(t) t.done=!t.done; render(); }
function updateTime(id,field,val){ const t=tasks.find(x=>x.id===id); if(t) t[field]=val; }
function deleteTask(id){ tasks=tasks.filter(x=>x.id!==id); render(); }
function deleteFromManage(id){ tasks=tasks.filter(x=>x.id!==id); render(); renderManage(); }
function setFilter(f,btn){ activeFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

function openModal(tab){ document.getElementById('modalOverlay').classList.add('open'); switchModalTab(tab||'create'); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); resetForm(); }
function resetForm(){
  document.getElementById('f-name').value='';
  document.getElementById('f-sub').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-cat').value='work';
  document.getElementById('f-prio').value='high';
}
function switchModalTab(tab){
  document.getElementById('panel-create').classList.toggle('active',tab==='create');
  document.getElementById('panel-manage').classList.toggle('active',tab==='manage');
  document.getElementById('mTab-create').classList.toggle('active',tab==='create');
  document.getElementById('mTab-manage').classList.toggle('active',tab==='manage');
  if(tab==='manage') renderManage();
  else setTimeout(()=>document.getElementById('f-name').focus(),50);
}
function createTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  tasks.push({ id:nextId++, name, sub:document.getElementById('f-sub').value.trim(), start:document.getElementById('f-start').value.trim()||'12:00 AM', end:document.getElementById('f-end').value.trim()||'12:00 AM', category:document.getElementById('f-cat').value, priority:document.getElementById('f-prio').value, done:false });
  resetForm();
  activeFilter='all';
  document.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  render();
  switchModalTab('manage');
}

document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();openModal();} });

render();
</script>
</body>
</html>
